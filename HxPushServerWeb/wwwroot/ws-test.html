<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HxPush 接口测试台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef3f8;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef3f8;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 26px;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input,
    textarea,
    button,
    select {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #c7d0df;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: #172033;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, "Cascadia Mono", monospace;
      line-height: 1.45;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      color: #fff;
      background: #2563eb;
      white-space: nowrap;
    }

    button.secondary {
      background: #64748b;
    }

    button.success {
      background: #16803f;
    }

    button.warn {
      background: #b45309;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 18px;
      border: 1px solid #d8e0ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
    }

    .field {
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 132px;
      font-weight: 600;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .dot.connected {
      background: #16a34a;
    }

    .dot.error {
      background: #dc2626;
    }

    .response {
      min-height: 132px;
      overflow: auto;
      border: 1px solid #d8e0ed;
      border-radius: 8px;
      padding: 12px;
      background: #0f172a;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 13px;
    }

    .log {
      height: 260px;
      overflow: auto;
      border: 1px solid #d8e0ed;
      border-radius: 8px;
      padding: 12px;
      background: #0f172a;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 13px;
    }

    .small {
      font-size: 13px;
      color: #64748b;
    }

    @media (max-width: 900px) {
      header,
      .grid,
      .two,
      .row {
        grid-template-columns: 1fr;
      }

      header {
        display: block;
      }

      .status {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>HxPush 接口测试台</h1>
        <div class="small">HTTP 默认返回 HxHttpResModel JSON；WebSocket 地址为 /ws。</div>
      </div>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Disconnected</span>
      </div>
    </header>

    <div class="grid">
      <section class="panel">
        <h2>HTTP 测试</h2>

        <div class="field">
          <label for="baseUrl">HTTP Base URL</label>
          <input id="baseUrl" autocomplete="off">
        </div>

        <div class="two">
          <div class="field">
            <label for="apiPath">接口路径</label>
            <select id="apiPath">
              <option value="/">GET /</option>
              <option value="/api/messages">POST /api/messages</option>
              <option value="/ws">GET /ws 普通 HTTP</option>
            </select>
          </div>
          <div class="field">
            <label for="httpMethod">方法</label>
            <select id="httpMethod">
              <option value="GET">GET</option>
              <option value="POST">POST</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="messageJson">请求体 JSON</label>
          <textarea id="messageJson" spellcheck="false"></textarea>
        </div>

        <div class="actions">
          <button id="sendHttpButton" class="success" type="button">发送 HTTP</button>
          <button id="fillSampleButton" type="button">生成消息 JSON</button>
          <button id="clearBodyButton" class="secondary" type="button">清空 Body</button>
        </div>

        <div class="field" style="margin-top: 14px;">
          <label for="httpResponse">HTTP Response</label>
          <div id="httpResponse" class="response" role="log" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel">
        <h2>WebSocket 测试</h2>

        <div class="row">
          <div>
            <label for="serverUrl">WebSocket URL</label>
            <input id="serverUrl" autocomplete="off">
          </div>
          <button id="connectButton" type="button">Connect</button>
          <button id="disconnectButton" class="secondary" type="button" disabled>Disconnect</button>
        </div>

        <div class="field">
          <label for="messageInput">Message</label>
          <textarea id="messageInput" placeholder="输入消息后点击 Send；输入 exit 可让服务端关闭连接。"></textarea>
        </div>

        <div class="actions">
          <button id="sendButton" type="button" disabled>Send</button>
          <button id="sendExitButton" class="warn" type="button" disabled>Send exit</button>
          <button id="clearLogButton" class="secondary" type="button">清空日志</button>
        </div>

        <div class="field" style="margin-top: 14px;">
          <label for="logBox">WebSocket Log</label>
          <div id="logBox" class="log" role="log" aria-live="polite"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const baseUrlInput = document.querySelector("#baseUrl");
    const apiPathSelect = document.querySelector("#apiPath");
    const httpMethodSelect = document.querySelector("#httpMethod");
    const messageJsonInput = document.querySelector("#messageJson");
    const sendHttpButton = document.querySelector("#sendHttpButton");
    const fillSampleButton = document.querySelector("#fillSampleButton");
    const clearBodyButton = document.querySelector("#clearBodyButton");
    const httpResponseBox = document.querySelector("#httpResponse");

    const serverUrlInput = document.querySelector("#serverUrl");
    const messageInput = document.querySelector("#messageInput");
    const connectButton = document.querySelector("#connectButton");
    const disconnectButton = document.querySelector("#disconnectButton");
    const sendButton = document.querySelector("#sendButton");
    const sendExitButton = document.querySelector("#sendExitButton");
    const clearLogButton = document.querySelector("#clearLogButton");
    const statusDot = document.querySelector("#statusDot");
    const statusText = document.querySelector("#statusText");
    const logBox = document.querySelector("#logBox");

    let socket;

    baseUrlInput.value = getDefaultHttpBaseUrl();
    serverUrlInput.value = getDefaultWebSocketUrl();
    fillSampleMessage();
    syncMethodWithPath();

    apiPathSelect.addEventListener("change", syncMethodWithPath);
    sendHttpButton.addEventListener("click", sendHttpRequest);
    fillSampleButton.addEventListener("click", fillSampleMessage);
    clearBodyButton.addEventListener("click", () => {
      messageJsonInput.value = "";
    });

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    sendButton.addEventListener("click", sendMessage);
    sendExitButton.addEventListener("click", () => sendRawMessage("exit"));
    clearLogButton.addEventListener("click", () => {
      logBox.textContent = "";
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key === "Enter") {
        sendMessage();
      }
    });

    function getDefaultHttpBaseUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        return `${location.protocol}//${location.host}`;
      }

      return "http://localhost:5212";
    }

    function getDefaultWebSocketUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        return `${protocol}//${location.host}/ws`;
      }

      return "ws://localhost:5212/ws";
    }

    function syncMethodWithPath() {
      const path = apiPathSelect.value;
      httpMethodSelect.value = path === "/api/messages" ? "POST" : "GET";
    }

    function fillSampleMessage() {
      const now = new Date();
      const id = `msg-${now.getTime()}`;
      const sample = {
        ID: id,
        AppKey: "app-demo",
        Hwid: "device-001",
        Msg: `测试消息 ${now.toLocaleString()}`
      };

      messageJsonInput.value = JSON.stringify(sample, null, 2);
      apiPathSelect.value = "/api/messages";
      httpMethodSelect.value = "POST";
    }

    async function sendHttpRequest() {
      const baseUrl = baseUrlInput.value.trim().replace(/\/+$/, "");
      const path = apiPathSelect.value;
      const method = httpMethodSelect.value;
      const url = `${baseUrl}${path}`;
      const options = { method };

      if (!baseUrl) {
        renderHttpResponse("HTTP Base URL 不能为空。", true);
        return;
      }

      if (method !== "GET") {
        options.headers = { "Content-Type": "application/json" };
        options.body = messageJsonInput.value;
      }

      renderHttpResponse(`请求中...\n${method} ${url}`);

      try {
        const response = await fetch(url, options);
        const text = await response.text();
        const prettyText = tryFormatJson(text);
        renderHttpResponse(`HTTP ${response.status}\n${prettyText}`);
      } catch (error) {
        renderHttpResponse(`请求失败：${error.message}`, true);
      }
    }

    function connect() {
      const url = serverUrlInput.value.trim();

      if (!url) {
        appendLog("Please enter a WebSocket URL.", "error");
        return;
      }

      disconnect();
      setStatus("Connecting", "pending");
      appendLog(`connect ${url}`);

      socket = new WebSocket(url);

      socket.addEventListener("open", () => {
        setStatus("Connected", "connected");
        appendLog("connected");
      });

      socket.addEventListener("message", (event) => {
        appendLog(`received ${event.data}`);
      });

      socket.addEventListener("close", (event) => {
        setStatus("Disconnected", "idle");
        appendLog(`closed code=${event.code}${event.reason ? ` reason=${event.reason}` : ""}`);
        socket = undefined;
      });

      socket.addEventListener("error", () => {
        setStatus("Error", "error");
        appendLog("connection error", "error");
      });
    }

    function disconnect() {
      if (socket && socket.readyState !== WebSocket.CLOSED) {
        socket.close(1000, "client disconnect");
      }
    }

    function sendMessage() {
      const message = messageInput.value.trim();

      if (!message) {
        appendLog("Please enter a message.", "error");
        return;
      }

      sendRawMessage(message);
      messageInput.value = "";
      messageInput.focus();
    }

    function sendRawMessage(message) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        appendLog("WebSocket is not connected.", "error");
        return;
      }

      socket.send(message);
      appendLog(`sent ${message}`);
    }

    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = "dot";

      if (state === "connected") {
        statusDot.classList.add("connected");
      }

      if (state === "error") {
        statusDot.classList.add("error");
      }

      const isConnected = state === "connected";
      connectButton.disabled = state === "connected" || state === "pending";
      disconnectButton.disabled = !isConnected;
      sendButton.disabled = !isConnected;
      sendExitButton.disabled = !isConnected;
    }

    function renderHttpResponse(message, isError = false) {
      const prefix = isError ? "! " : "";
      httpResponseBox.textContent = `${prefix}${message}`;
    }

    function appendLog(message, level = "info") {
      const time = new Date().toLocaleTimeString();
      const prefix = level === "error" ? "!" : ">";
      logBox.textContent += `[${time}] ${prefix} ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function tryFormatJson(text) {
      try {
        return JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        return text;
      }
    }
  </script>
</body>
</html>
