<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HxPush WebSocket 测试</title>
  <style>
    /* 页面只承载 WebSocket 连接、推送和接收测试。 */
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f6;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2f6;
    }

    main {
      width: min(880px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header,
    .heading-row,
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header {
      margin-bottom: 16px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.25;
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      font-size: 17px;
    }

    .panel {
      padding: 20px;
      border: 1px solid #d3dbe6;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      font-size: 14px;
      font-weight: 600;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #98a2b3;
    }

    .dot.connected {
      background: #16803f;
    }

    .dot.error {
      background: #c4320a;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #bdc7d5;
      border-radius: 6px;
      padding: 10px 12px;
      background: #fff;
      color: #172033;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    input:disabled {
      background: #f2f4f7;
      color: #667085;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.5;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    button.secondary {
      background: #475467;
    }

    button.warn {
      background: #b54708;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .connection-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(160px, 1fr) minmax(160px, 1fr);
      gap: 10px;
    }

    .field {
      margin-bottom: 14px;
    }

    .actions {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .divider {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #e4e7ec;
    }

    .log {
      height: 300px;
      margin-top: 12px;
      overflow: auto;
      border: 1px solid #d3dbe6;
      border-radius: 6px;
      padding: 12px;
      background: #101828;
      color: #e4e7ec;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 880px);
        padding: 20px 0;
      }

      .connection-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>HxPush WebSocket 测试</h1>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">未连接</span>
      </div>
    </header>

    <section class="panel">
      <!-- 连接身份由握手 URL 中的 AppKey 确定。 -->
      <div class="connection-grid">
        <div class="field">
          <label for="serverUrl">WebSocket URL</label>
          <input id="serverUrl" autocomplete="off">
        </div>
        <div class="field">
          <label for="appKey">AppKey</label>
          <input id="appKey" value="app-demo" autocomplete="off">
        </div>
        <div class="field">
          <label for="hwid">Hwid</label>
          <input id="hwid" value="web-test-device" autocomplete="off">
        </div>
      </div>

      <div class="actions">
        <button id="connectButton" type="button">连接</button>
        <button id="disconnectButton" class="secondary" type="button" disabled>断开</button>
      </div>

      <hr class="divider">

      <!-- 发送内容会被包装成 HxPushMsgModel 并转发给同 AppKey 连接。 -->
      <div class="field">
        <label for="messageInput">消息内容</label>
        <textarea id="messageInput">WebSocket 推送测试</textarea>
      </div>

      <div class="actions">
        <button id="pushButton" type="button" disabled>按 AppKey 推送</button>
        <button id="badAppKeyButton" class="warn" type="button" disabled>测试错误 AppKey</button>
      </div>

      <hr class="divider">

      <div class="heading-row">
        <h2>收发日志</h2>
        <button id="clearLogButton" class="secondary" type="button">清空</button>
      </div>
      <div id="logBox" class="log" role="log" aria-live="polite"></div>
    </section>
  </main>

  <script>
    // 缓存 WebSocket 测试控件和当前连接身份。
    const serverUrlInput = document.querySelector("#serverUrl");
    const appKeyInput = document.querySelector("#appKey");
    const hwidInput = document.querySelector("#hwid");
    const messageInput = document.querySelector("#messageInput");
    const connectButton = document.querySelector("#connectButton");
    const disconnectButton = document.querySelector("#disconnectButton");
    const pushButton = document.querySelector("#pushButton");
    const badAppKeyButton = document.querySelector("#badAppKeyButton");
    const clearLogButton = document.querySelector("#clearLogButton");
    const statusDot = document.querySelector("#statusDot");
    const statusText = document.querySelector("#statusText");
    const logBox = document.querySelector("#logBox");

    let socket;
    let connectedAppKey = "";

    serverUrlInput.value = getDefaultWebSocketUrl();

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    pushButton.addEventListener("click", () => pushByAppKey());
    badAppKeyButton.addEventListener("click", sendMismatchedAppKey);
    clearLogButton.addEventListener("click", () => logBox.textContent = "");

    messageInput.addEventListener("keydown", event => {
      if (event.ctrlKey && event.key === "Enter") {
        pushByAppKey();
      }
    });

    // 允许在浏览器控制台中直接调用 pushByAppKey(appKey, message)。
    window.pushByAppKey = pushByAppKey;

    function getDefaultWebSocketUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        return `${protocol}//${location.host}/ws`;
      }

      return "ws://localhost:5212/ws";
    }

    // 使用 AppKey 查询参数建立连接，服务端会在协议升级前完成校验。
    function connect() {
      const serverUrl = serverUrlInput.value.trim();
      const appKey = appKeyInput.value.trim();

      if (!serverUrl || !appKey) {
        appendLog("WebSocket URL 和 AppKey 不能为空。", "error");
        return;
      }

      let url;
      try {
        const parsedUrl = new URL(serverUrl);
        parsedUrl.searchParams.set("appkey", appKey);
        url = parsedUrl.toString();
      } catch {
        appendLog("WebSocket URL 格式不正确。", "error");
        return;
      }

      disconnect();
      setStatus("连接中", "pending");
      appendLog(`连接：${url}`);

      socket = new WebSocket(url);
      socket.addEventListener("open", () => {
        connectedAppKey = appKey;
        setStatus("已连接", "connected");
        appendLog(`连接成功：AppKey=${connectedAppKey}`);
      });

      socket.addEventListener("message", event => {
        appendLog(`接收：\n${tryFormatJson(event.data)}`);
      });

      socket.addEventListener("close", event => {
        appendLog(`连接关闭：code=${event.code}${event.reason ? ` reason=${event.reason}` : ""}`);
        socket = undefined;
        connectedAppKey = "";
        setStatus("未连接", "idle");
      });

      socket.addEventListener("error", () => {
        appendLog("WebSocket 连接错误。", "error");
        setStatus("连接错误", "error");
      });
    }

    // 构造完整消息并通过纯 WebSocket 推送给同 AppKey 的连接。
    function pushByAppKey(appKey = appKeyInput.value, message = messageInput.value) {
      const targetAppKey = String(appKey).trim();
      const content = String(message).trim();
      const hwid = hwidInput.value.trim();

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        appendLog("WebSocket 尚未连接。", "error");
        return false;
      }

      if (!targetAppKey || !hwid || !content) {
        appendLog("AppKey、Hwid 和消息内容不能为空。", "error");
        return false;
      }

      if (targetAppKey !== connectedAppKey) {
        appendLog("推送 AppKey 必须与当前连接 AppKey 一致。", "error");
        return false;
      }

      const pushMessage = {
        ID: generateId(),
        AppKey: targetAppKey,
        Hwid: hwid,
        Msg: content
      };
      const payload = JSON.stringify(pushMessage);

      socket.send(payload);
      appendLog(`发送：\n${tryFormatJson(payload)}`);
      return true;
    }

    // 发送不匹配的 AppKey，用于验证服务端会按策略关闭连接。
    function sendMismatchedAppKey() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        appendLog("WebSocket 尚未连接。", "error");
        return;
      }

      const payload = JSON.stringify({
        ID: generateId(),
        AppKey: `${connectedAppKey}-invalid`,
        Hwid: hwidInput.value.trim() || "web-test-device",
        Msg: "错误 AppKey 测试"
      });

      socket.send(payload);
      appendLog(`发送错误 AppKey：\n${tryFormatJson(payload)}`);
    }

    function disconnect() {
      if (socket && socket.readyState !== WebSocket.CLOSED) {
        socket.close(1000, "client disconnect");
      }
    }

    function generateId() {
      const bytes = crypto.getRandomValues(new Uint8Array(16));
      return [...bytes].map(value => value.toString(16).padStart(2, "0")).join("");
    }

    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = "dot";
      statusDot.classList.toggle("connected", state === "connected");
      statusDot.classList.toggle("error", state === "error");

      const isConnected = state === "connected";
      const isPending = state === "pending";
      connectButton.disabled = isConnected || isPending;
      disconnectButton.disabled = !isConnected;
      pushButton.disabled = !isConnected;
      badAppKeyButton.disabled = !isConnected;
      serverUrlInput.disabled = isConnected || isPending;
      appKeyInput.disabled = isConnected || isPending;
    }

    function appendLog(message, level = "info") {
      const time = new Date().toLocaleTimeString();
      const prefix = level === "error" ? "!" : ">";
      logBox.textContent += `[${time}] ${prefix} ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function tryFormatJson(text) {
      try {
        return JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        return text;
      }
    }
  </script>
</body>
</html>
