<!doctype html>
<!-- 早期独立 WebSocket 测试页；服务实际发布的是 wwwroot/ws-test.html。 -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HxPush WebSocket 测试</title>
  <style>
    /* 页面主题和基础布局。 */
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #182848, #4b6cb7);
    }

    main {
      width: min(920px, calc(100vw - 32px));
      padding: 24px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      color: #172033;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: #5d6678;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #c7cede;
      border-radius: 10px;
      padding: 12px 14px;
      background: #fff;
      color: #172033;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #4b6cb7;
      box-shadow: 0 0 0 3px rgba(75, 108, 183, 0.18);
    }

    /* 连接区和消息区使用响应式网格。 */
    .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    .message-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      color: #fff;
      background: #4b6cb7;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.secondary {
      background: #68758f;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #31406f;
      font-weight: 600;
    }

    /* 状态点颜色反映连接结果。 */
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9aa4b8;
    }

    .dot.connected {
      background: #18a058;
    }

    .dot.error {
      background: #d03050;
    }

    .log {
      height: 320px;
      overflow: auto;
      border: 1px solid #d8deea;
      border-radius: 12px;
      padding: 12px;
      background: #0f172a;
      color: #dbeafe;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      margin-top: 12px;
      font-size: 14px;
      color: #68758f;
    }

    @media (max-width: 720px) {
      .row,
      .message-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 旧版页面仅提供 WebSocket 连接和文本收发。 -->
  <main>
    <h1>HxPush WebSocket 测试</h1>
    <p>启动服务后，地址需要携带 AppKey，例如 <code>ws://192.168.1.10:5212/ws?appkey=app-demo</code>。</p>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">未连接</span>
    </div>

    <div class="row">
      <div>
        <label for="serverUrl">WebSocket 地址</label>
        <input id="serverUrl" autocomplete="off">
      </div>
      <button id="connectButton" type="button">连接</button>
      <button id="disconnectButton" class="secondary" type="button" disabled>断开</button>
    </div>

    <div class="message-row">
      <div>
        <label for="messageInput">发送内容</label>
        <textarea id="messageInput" placeholder="输入一段测试消息，比如：hello hxpush"></textarea>
      </div>
      <button id="sendButton" type="button" disabled>发送</button>
    </div>

    <label for="logBox">日志</label>
    <div id="logBox" class="log" role="log" aria-live="polite"></div>
    <div class="hint">如果局域网设备无法连接，请确认电脑和设备在同一网络，并检查 Windows 防火墙是否放行端口 5000。</div>
  </main>

  <script>
    // 缓存页面控件并保存当前连接。
    const serverUrlInput = document.querySelector("#serverUrl");
    const messageInput = document.querySelector("#messageInput");
    const connectButton = document.querySelector("#connectButton");
    const disconnectButton = document.querySelector("#disconnectButton");
    const sendButton = document.querySelector("#sendButton");
    const statusDot = document.querySelector("#statusDot");
    const statusText = document.querySelector("#statusText");
    const logBox = document.querySelector("#logBox");

    let socket;

    // 初始化默认地址并绑定用户操作。
    serverUrlInput.value = getDefaultWebSocketUrl();

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key === "Enter") {
        sendMessage();
      }
    });

    // 根据当前页面协议生成默认 WebSocket 地址。
    function getDefaultWebSocketUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        return `${protocol}//${location.hostname}:5212/ws?appkey=app-demo`;
      }

      return "ws://localhost:5212/ws?appkey=app-demo";
    }

    // 建立连接并监听打开、消息、关闭和错误事件。
    function connect() {
      const url = serverUrlInput.value.trim();

      if (!url) {
        appendLog("请输入 WebSocket 地址。", "error");
        return;
      }

      disconnect();
      setStatus("连接中...", "pending");
      appendLog(`连接：${url}`);

      socket = new WebSocket(url);

      socket.addEventListener("open", () => {
        setStatus("已连接", "connected");
        appendLog("连接成功。");
      });

      socket.addEventListener("message", (event) => {
        appendLog(`收到：${event.data}`);
      });

      socket.addEventListener("close", (event) => {
        setStatus("已断开", "idle");
        appendLog(`连接关闭：code=${event.code}${event.reason ? ` reason=${event.reason}` : ""}`);
        socket = undefined;
      });

      socket.addEventListener("error", () => {
        setStatus("连接错误", "error");
        appendLog("连接发生错误，请检查地址、服务状态或防火墙。", "error");
      });
    }

    // 主动发起正常关闭。
    function disconnect() {
      if (socket && socket.readyState !== WebSocket.CLOSED) {
        socket.close(1000, "client disconnect");
      }
    }

    // 发送输入框文本并在日志中记录。
    function sendMessage() {
      const message = messageInput.value.trim();

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        appendLog("WebSocket 未连接，不能发送。", "error");
        return;
      }

      if (!message) {
        appendLog("请输入要发送的内容。", "error");
        return;
      }

      socket.send(message);
      appendLog(`发送：${message}`);
      messageInput.value = "";
      messageInput.focus();
    }

    // 同步状态文字、状态点和按钮可用性。
    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = "dot";

      if (state === "connected") {
        statusDot.classList.add("connected");
      }

      if (state === "error") {
        statusDot.classList.add("error");
      }

      const isConnected = state === "connected";
      connectButton.disabled = state === "connected" || state === "pending";
      disconnectButton.disabled = !isConnected;
      sendButton.disabled = !isConnected;
    }

    // 追加带时间的页面日志。
    function appendLog(message, level = "info") {
      const time = new Date().toLocaleTimeString();
      const prefix = level === "error" ? "✖" : "•";
      logBox.textContent += `[${time}] ${prefix} ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }
  </script>
</body>
</html>
